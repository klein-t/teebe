name: Release

# CD: on a version tag (vX.Y.Z), build a release .app bundle, sign a Sparkle
# appcast, and attach both to a GitHub Release. The bundle is ad-hoc code-signed
# only (see scripts/make-app.sh); Developer ID signing + notarization are out of
# scope until signing certs are wired in as repository secrets. Sparkle updates
# are integrity-signed with an EdDSA key independent of Apple notarization.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build & publish .app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Show Swift version
        run: swift --version

      - name: Build release .app bundle
        env:
          # Sparkle: public key embedded in Info.plist must pair with the private
          # key used to sign the appcast below. Set as a repo variable/secret.
          SU_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          # Stamp the release version into the bundle. CFBundleVersion must
          # increase per release or Sparkle never sees a newer version.
          APP_VERSION="${GITHUB_REF_NAME#v}" ./scripts/make-app.sh release

      - name: Extract release notes from CHANGELOG.md
        run: |
          # Single source of truth: the tag's CHANGELOG.md section feeds both the
          # GitHub release body and the Sparkle appcast notes below.
          VER="${GITHUB_REF_NAME#v}"
          ./scripts/changelog-section.sh "$VER" > RELEASE_NOTES.md || true
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::warning::No CHANGELOG.md section for $VER — notes fall back to auto-generated."
            printf '_No changelog entry for %s._\n' "$VER" > RELEASE_NOTES.md
          fi
          echo "----- release notes -----"; cat RELEASE_NOTES.md

      - name: Stage update archive
        run: |
          mkdir -p sparkle-updates
          ditto -c -k --keepParent teebe.app "sparkle-updates/teebe-${GITHUB_REF_NAME}.zip"
          # Same-basename .md → generate_appcast attaches it as this item's notes.
          cp RELEASE_NOTES.md "sparkle-updates/teebe-${GITHUB_REF_NAME}.md"

      - name: Generate & sign Sparkle appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          GEN="$(find .build/artifacts -name generate_appcast -path '*/bin/*' | head -1)"
          # Sign update enclosures with the EdDSA private key (read from stdin),
          # and point download URLs at this release's assets.
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | "$GEN" \
            --ed-key-file - \
            --embed-release-notes \
            --download-url-prefix "https://github.com/klein-t/teebe/releases/download/${GITHUB_REF_NAME}/" \
            sparkle-updates
          cp sparkle-updates/teebe-*.zip .
          cp sparkle-updates/appcast.xml .

      - name: Build drag-install DMG for the website download
        run: |
          # Sparkle auto-updates use the signed zip above; this DMG is only the
          # first-time download linked from teebe.io. Simple grey layout (big
          # icons: teebe left, Applications right), built with dmgbuild which
          # writes the window settings directly — no Finder/AppleScript, so it
          # works on CI. Stable, version-independent filename so the teebe.io
          # link stays valid across every release. App inside is already signed.
          ./scripts/make-dmg.sh teebe.app teebe-macos.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Attach both the app zip and the signed appcast to the release. The zip
          # is the update enclosure (stays on GitHub Releases); the appcast.xml is
          # the source the publish-appcast workflow copies to teebe.io on publish.
          # NOTE: the release is drafted. SUFeedURL points at https://teebe.io/
          # appcast.xml, which is only updated when the draft is published (that
          # fires publish-appcast). Publishing is what actually ships the update.
          files: |
            teebe-*.zip
            teebe-macos.dmg
            appcast.xml
          # Curated notes from CHANGELOG.md, with the auto-generated commit/PR list
          # appended below them.
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          draft: true
